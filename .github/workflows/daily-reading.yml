name: Generate Daily Reading

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 00:00 UTC (한국 오전 9시)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 스크립트 실행
        run: node scripts2/generate-daily-reading.js

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add src/todayReading.json
          git commit -m "auto: update daily reading" || echo "No changes"
          git push
